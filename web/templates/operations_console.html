<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运营控制台</title>
    <style>
        :root {
            --bg: #f6f8fb;
            --surface: #ffffff;
            --line: #d7dde6;
            --text: #17202e;
            --muted: #5f6b7a;
            --primary: #1f6feb;
            --primary-dark: #174ea6;
            --good: #0f7b45;
            --warn: #9a6700;
            --bad: #b42318;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
        }

        .shell {
            width: min(1440px, 100%);
            margin: 0 auto;
            padding: 24px;
        }

        header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0 0 6px;
            font-size: 28px;
            line-height: 1.15;
            letter-spacing: 0;
        }

        .subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .status,
        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
        }

        .status {
            min-width: 220px;
            padding: 10px 12px;
            color: var(--muted);
            font-size: 13px;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
            gap: 16px;
            align-items: start;
        }

        .panel {
            padding: 16px;
        }

        .panel h2 {
            margin: 0 0 12px;
            font-size: 16px;
            line-height: 1.25;
            letter-spacing: 0;
        }

        label {
            display: block;
            margin: 12px 0 6px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px 12px;
            font: inherit;
            color: var(--text);
            background: #fff;
        }

        textarea {
            min-height: 112px;
            resize: vertical;
        }

        button {
            width: 100%;
            margin-top: 14px;
            border: 0;
            border-radius: 8px;
            padding: 11px 14px;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: var(--primary-dark);
        }

        button.secondary {
            background: #eef2f8;
            color: var(--text);
            border: 1px solid var(--line);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .reply {
            min-height: 96px;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        pre {
            min-height: 74px;
            max-height: 260px;
            overflow: auto;
            margin: 0;
            padding: 12px;
            border-radius: 8px;
            background: #f0f3f8;
            color: #17202e;
            font-size: 12px;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .kv {
            display: grid;
            grid-template-columns: 112px minmax(0, 1fr);
            gap: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .kv span:first-child {
            color: var(--muted);
            font-weight: 700;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #f7f9fc;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }

        .badge.good {
            color: var(--good);
            border-color: #b7e2c7;
            background: #eefaf2;
        }

        .badge.warn {
            color: var(--warn);
            border-color: #f1d28a;
            background: #fff8e6;
        }

        .badge.bad {
            color: var(--bad);
            border-color: #f4b6ae;
            background: #fff1ef;
        }

        .timeline {
            min-height: 74px;
            max-height: 260px;
            overflow: auto;
            margin: 0;
            padding: 0;
            list-style: none;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #f7f9fc;
        }

        .timeline li {
            display: grid;
            grid-template-columns: 28px minmax(0, 1fr);
            gap: 10px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--line);
            font-size: 12px;
            line-height: 1.45;
        }

        .timeline li:last-child {
            border-bottom: 0;
        }

        .timeline .index {
            color: var(--muted);
            font-weight: 700;
        }

        .timeline .node {
            font-weight: 700;
            color: var(--text);
        }

        .timeline .meta {
            margin-top: 2px;
            color: var(--muted);
            word-break: break-word;
        }

        @media (max-width: 900px) {
            .shell {
                padding: 16px;
            }

            header,
            .layout {
                display: block;
            }

            .status,
            .panel {
                margin-bottom: 12px;
            }

            .grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <header>
            <div>
                <h1>运营控制台</h1>
                <p class="subtitle">用于预约、确认、工具治理、客户记忆、RAG 引用、人工升级和 trace 检查的状态化运营运行时。</p>
            </div>
            <div class="status" id="runtime-status">空闲</div>
        </header>

        <section class="layout">
            <form class="panel" id="operations-form">
                <h2>请求信息</h2>
                <label for="user-id">用户 ID</label>
                <input id="user-id" name="user_id" value="local_user">

                <label for="conversation-id">会话 ID</label>
                <input id="conversation-id" name="conversation_id" value="ops_console">

                <label for="message">消息</label>
                <textarea id="message" name="message">我想预约明天下午 3 点的肩颈放松。</textarea>

                <button type="submit">运行本轮</button>
                <button type="button" class="secondary" id="confirm-action">确认待执行操作</button>
            </form>

            <div class="grid">
                <section class="panel">
                    <h2>响应结果</h2>
                    <div class="kv"><span>意图</span><span id="intent-value">-</span></div>
                    <div class="kv"><span>Trace ID</span><span id="trace-id-value">-</span></div>
                    <div class="reply" id="reply-panel">尚未运行对话。</div>
                </section>

                <section class="panel" id="decision-panel">
                    <h2>LLM 决策诊断</h2>
                    <div class="kv"><span>决策来源</span><span id="decision-source-value">-</span></div>
                    <div class="kv"><span>置信度</span><span id="decision-confidence-value">-</span></div>
                    <pre id="decision-json">{}</pre>
                </section>

                <section class="panel" id="confirmation-panel">
                    <h2>确认信息</h2>
                    <div id="confirmation-status"><span class="badge">无</span></div>
                    <pre id="confirmation-json">{}</pre>
                </section>

                <section class="panel" id="tool-calls-panel">
                    <h2>工具调用</h2>
                    <pre id="tool-calls-json">[]</pre>
                </section>

                <section class="panel" id="memory-panel">
                    <h2>客户记忆</h2>
                    <pre id="memory-json">[]</pre>
                </section>

                <section class="panel" id="rag-panel">
                    <h2>RAG 来源</h2>
                    <pre id="rag-json">{}</pre>
                </section>

                <section class="panel" id="trace-panel">
                    <h2>Trace 详情</h2>
                    <pre id="trace-json">{}</pre>
                </section>

                <section class="panel" id="trace-timeline-panel">
                    <h2>Trace 时间线</h2>
                    <ol class="timeline" id="trace-timeline">
                        <li><span class="index">-</span><span>尚未加载持久化 trace。</span></li>
                    </ol>
                </section>

                <section class="panel" id="escalation-panel">
                    <h2>人工升级</h2>
                    <div id="escalation-status"><span class="badge">无</span></div>
                </section>
            </div>
        </section>
    </main>

    <script>
        const state = {pendingConfirmation: null, lastResponse: null};
        const $ = (id) => document.getElementById(id);

        function asJson(value) {
            return JSON.stringify(value ?? {}, null, 2);
        }

        function displayValue(value) {
            return value === null || value === undefined || value === "" ? "-" : String(value);
        }

        function setStatus(text, kind = "") {
            $("runtime-status").innerHTML = kind ? `<span class="badge ${kind}">${text}</span>` : text;
        }

        function render(data) {
            state.lastResponse = data;
            state.pendingConfirmation = data.confirmation_required ? data.confirmation_request : null;
            const decision = data.decision || {};
            $("intent-value").textContent = data.intent || "-";
            $("trace-id-value").textContent = data.trace_id || "-";
            $("reply-panel").textContent = data.reply || "";
            $("decision-source-value").textContent = displayValue(decision.source);
            $("decision-confidence-value").textContent = displayValue(decision.confidence);
            $("decision-json").textContent = asJson({
                intent: displayValue(decision.intent),
                route: displayValue(decision.route),
                provider: displayValue(decision.provider),
                model: displayValue(decision.model),
                attempt_count: displayValue(decision.attempt_count),
                repair_count: displayValue(decision.repair_count),
                fallback_reason: displayValue(decision.fallback_reason),
                latency_ms: displayValue(decision.latency_ms),
                input_tokens: displayValue(decision.input_tokens),
                output_tokens: displayValue(decision.output_tokens)
            });
            $("confirmation-json").textContent = asJson(data.confirmation_request || {});
            $("tool-calls-json").textContent = asJson({
                planned: data.tool_calls || [],
                executed: data.executed_tools || []
            });
            $("memory-json").textContent = asJson({
                proposals: data.memory_proposals || [],
                customer_context: data.customer_context || {},
                memory_used: data.memory_used || false,
                applied_customer_memories: data.applied_customer_memories || []
            });
            $("rag-json").textContent = asJson(data.rag_citations || {});
            $("trace-json").textContent = asJson({
                trace_id: data.trace_id,
                rag_used: data.rag_used,
                memory_used: data.memory_used,
                missing_slots: data.missing_slots || []
            });
            $("confirmation-status").innerHTML = data.confirmation_required
                ? '<span class="badge warn">需要确认</span>'
                : '<span class="badge good">无需确认</span>';
            $("escalation-status").innerHTML = data.escalated
                ? '<span class="badge bad">已升级</span>'
                : '<span class="badge good">未升级</span>';
        }

        function renderTraceTimeline(events) {
            const timeline = $("trace-timeline");
            timeline.innerHTML = "";
            if (!events || events.length === 0) {
                const item = document.createElement("li");
                const index = document.createElement("span");
                index.className = "index";
                index.textContent = "-";
                const body = document.createElement("span");
                body.textContent = "未找到 trace。";
                item.append(index, body);
                timeline.appendChild(item);
                return;
            }
            events.forEach((event, position) => {
                const item = document.createElement("li");
                const index = document.createElement("span");
                index.className = "index";
                index.textContent = String(position + 1);
                const body = document.createElement("span");
                const node = document.createElement("div");
                node.className = "node";
                node.textContent = `${event.node || "-"} / ${event.event_type || "事件"}`;
                const meta = document.createElement("div");
                meta.className = "meta";
                meta.textContent = traceEventSummary(event);
                body.append(node, meta);
                item.append(index, body);
                timeline.appendChild(item);
            });
        }

        function traceEventSummary(event) {
            const metadata = event.metadata || {};
            if (event.error) {
                return event.error.code || "错误";
            }
            if (metadata.tool_name) {
                return `${metadata.tool_name} / ${metadata.status || "ok"}`;
            }
            if (metadata.intent) {
                return `intent=${metadata.intent}`;
            }
            if (metadata.status) {
                return `status=${metadata.status}`;
            }
            return `${event.latency_ms || 0}ms`;
        }

        async function loadTrace(traceId) {
            if (!traceId) {
                renderTraceTimeline([]);
                return;
            }
            const response = await fetch(`/api/operations/traces/${encodeURIComponent(traceId)}`);
            if (!response.ok) {
                renderTraceTimeline([]);
                $("trace-json").textContent = asJson({
                    trace_id: traceId,
                    status: "未持久化"
                });
                return;
            }
            const data = await response.json();
            renderTraceTimeline(data.events || []);
            $("trace-json").textContent = asJson({
                trace_id: data.trace_id,
                replay: data.replay,
                events: data.events || []
            });
        }

        async function runTurn(payload) {
            setStatus("运行中", "warn");
            const response = await fetch("/api/operations/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(payload)
            });
            if (!response.ok) {
                setStatus(`HTTP ${response.status}`, "bad");
                throw new Error(`Operations API returned ${response.status}`);
            }
            const data = await response.json();
            render(data);
            await loadTrace(data.trace_id);
            setStatus("就绪", "good");
            return data;
        }

        $("operations-form").addEventListener("submit", async (event) => {
            event.preventDefault();
            await runTurn({
                user_id: $("user-id").value,
                conversation_id: $("conversation-id").value,
                message: $("message").value
            });
        });

        $("confirm-action").addEventListener("click", async () => {
            if (!state.pendingConfirmation) {
                setStatus("没有待确认操作", "");
                return;
            }
            await runTurn({
                user_id: $("user-id").value,
                conversation_id: $("conversation-id").value,
                message: "确认",
                confirmed_tool_name: state.pendingConfirmation.tool_name,
                confirmed_tool_arguments: state.pendingConfirmation.arguments,
                confirmation_token: state.pendingConfirmation.confirmation_token
            });
        });
    </script>
</body>
</html>
