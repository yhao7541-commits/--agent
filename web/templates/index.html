<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地生活服务预约台</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f6f1;
            --surface: #ffffff;
            --surface-soft: #f8faf6;
            --line: #d9dfd2;
            --text: #1d2524;
            --muted: #64706d;
            --green: #24564a;
            --green-strong: #173d35;
            --teal: #1f7a77;
            --coral: #c85d44;
            --amber: #b8892d;
            --blue: #355f9f;
            --shadow: 0 18px 42px rgba(31, 47, 43, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                linear-gradient(180deg, rgba(36, 86, 74, 0.08), rgba(200, 93, 68, 0.04)),
                var(--bg);
            color: var(--text);
            font-family: "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        button,
        input {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .app-shell {
            width: min(1280px, 100%);
            min-height: 100vh;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: 300px minmax(0, 1fr);
            gap: 18px;
        }

        .sidebar,
        .chat-panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .sidebar {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            background: var(--green);
            color: #fff;
            font-size: 20px;
        }

        .brand h1 {
            margin: 14px 0 8px;
            font-size: 26px;
            line-height: 1.18;
            letter-spacing: 0;
        }

        .brand p {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
        }

        .section-title {
            margin: 0 0 10px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        .nav-list,
        .quick-list {
            display: grid;
            gap: 8px;
        }

        .nav-btn,
        .quick-fill,
        #clear-btn {
            width: 100%;
            min-height: 42px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface-soft);
            color: var(--text);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
            font-weight: 700;
            transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
        }

        .nav-btn:hover,
        .quick-fill:hover,
        #clear-btn:hover {
            background: #fff;
            border-color: var(--green);
            transform: translateY(-1px);
        }

        .nav-btn i {
            width: 18px;
            color: var(--teal);
            text-align: center;
        }

        .quick-fill {
            align-items: flex-start;
            color: #2b3836;
            font-size: 13px;
            line-height: 1.45;
            font-weight: 600;
        }

        .quick-fill::before {
            content: "";
            width: 8px;
            min-width: 8px;
            height: 8px;
            margin-top: 6px;
            border-radius: 50%;
            background: var(--coral);
        }

        #clear-btn {
            margin-top: auto;
            color: var(--coral);
            justify-content: center;
            text-align: center;
        }

        .chat-panel {
            min-height: calc(100vh - 48px);
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto auto;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 22px;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
            background: linear-gradient(90deg, rgba(36, 86, 74, 0.08), rgba(184, 137, 45, 0.10));
        }

        .chat-header h2 {
            margin: 0;
            font-size: 22px;
            line-height: 1.25;
            letter-spacing: 0;
        }

        .chat-header p {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.55;
        }

        .status-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
        }

        .status-chip {
            border: 1px solid rgba(36, 86, 74, 0.22);
            border-radius: 8px;
            padding: 7px 10px;
            background: #fff;
            color: var(--green);
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .chat-content {
            padding: 22px;
            overflow-y: auto;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(248, 250, 246, 0.94)),
                var(--surface-soft);
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            margin-bottom: 16px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            min-width: 36px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            color: #fff;
            background: var(--green);
        }

        .message.user .avatar {
            background: var(--blue);
        }

        .bubble {
            max-width: min(680px, 78%);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 13px 14px;
            background: #fff;
            color: var(--text);
            font-size: 14px;
            line-height: 1.65;
            box-shadow: 0 8px 22px rgba(31, 47, 43, 0.08);
        }

        .message.user .bubble {
            border-color: rgba(53, 95, 159, 0.34);
            background: #eef4ff;
        }

        .bot-reply,
        .bot-info,
        .bot-success,
        .bot-error,
        .bot-thought {
            border-radius: 8px;
            padding: 10px 12px;
            margin: 6px 0;
        }

        .bot-reply {
            background: #fff;
        }

        .bot-info {
            background: #eef7f5;
            color: var(--green-strong);
            border-left: 4px solid var(--teal);
        }

        .bot-success {
            background: #f5f8ed;
            color: #37612f;
            border-left: 4px solid #6f9d43;
            font-weight: 700;
        }

        .bot-error {
            background: #fff1ed;
            color: #9c3524;
            border-left: 4px solid var(--coral);
            font-weight: 700;
        }

        .bot-thought {
            background: #f2f3f0;
            color: var(--muted);
            font-size: 13px;
        }

        .typing-indicator {
            display: none;
            padding: 0 22px 14px;
            color: var(--muted);
            font-size: 13px;
        }

        .typing-dots {
            display: inline-flex;
            gap: 4px;
            margin-right: 8px;
            vertical-align: middle;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: typing 1.1s infinite ease-in-out;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.16s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.32s;
        }

        @keyframes typing {
            0%, 70%, 100% {
                transform: translateY(0);
                opacity: 0.35;
            }
            35% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }

        .input-area {
            padding: 16px 22px 20px;
            border-top: 1px solid var(--line);
            background: var(--surface);
        }

        #chat-form {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
        }

        #user-input {
            width: 100%;
            min-height: 46px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 12px 14px;
            color: var(--text);
            background: #fff;
            outline: none;
        }

        #user-input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(36, 86, 74, 0.12);
        }

        #send-btn {
            min-height: 46px;
            border: 0;
            border-radius: 8px;
            padding: 0 18px;
            background: var(--green);
            color: #fff;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        #send-btn:hover {
            background: var(--green-strong);
        }

        #send-btn:disabled {
            opacity: 0.7;
            cursor: wait;
        }

        @media (max-width: 920px) {
            .app-shell {
                min-height: auto;
                padding: 12px;
                display: block;
            }

            .sidebar {
                margin-bottom: 12px;
            }

            .chat-panel {
                min-height: 72vh;
            }

            .chat-header {
                display: block;
            }

            .status-strip {
                margin-top: 12px;
                justify-content: flex-start;
            }

            .bubble {
                max-width: 86%;
            }
        }

        @media (max-width: 560px) {
            .app-shell {
                padding: 0;
            }

            .sidebar,
            .chat-panel {
                border-radius: 0;
                box-shadow: none;
                border-left: 0;
                border-right: 0;
            }

            .brand h1 {
                font-size: 23px;
            }

            .chat-header,
            .chat-content,
            .input-area {
                padding-left: 14px;
                padding-right: 14px;
            }

            #chat-form {
                grid-template-columns: 1fr;
            }

            #send-btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <main class="app-shell">
        <aside class="sidebar" aria-label="快捷操作">
            <section class="brand">
                <div class="brand-mark"><i class="fas fa-spa"></i></div>
                <h1>本地生活服务预约台</h1>
                <p>预约、咨询、排班与运营管理集中处理。</p>
            </section>

            <section aria-labelledby="nav-title">
                <h2 class="section-title" id="nav-title">常用入口</h2>
                <div class="nav-list">
                    <button class="nav-btn" onclick="window.location.href='/operations'">
                        <i class="fas fa-sliders-h"></i>
                        运营控制台
                    </button>
                    <button class="nav-btn" onclick="window.location.href='/memory'">
                        <i class="fas fa-clipboard-list"></i>
                        客户记忆
                    </button>
                    <button class="nav-btn" onclick="window.location.href='/knowledge'">
                        <i class="fas fa-database"></i>
                        知识库
                    </button>
                    <button class="nav-btn" onclick="window.location.href='/technician'">
                        <i class="fas fa-user-md"></i>
                        技师状态
                    </button>
                    <button class="nav-btn" onclick="window.location.href='/technician_schedule'">
                        <i class="fas fa-calendar-alt"></i>
                        技师排班
                    </button>
                    <button class="nav-btn" onclick="window.location.href='/user_behavior'">
                        <i class="fas fa-chart-line"></i>
                        用户分析
                    </button>
                </div>
            </section>

            <section aria-labelledby="quick-title">
                <h2 class="section-title" id="quick-title">快速需求</h2>
                <div class="quick-list">
                    <button type="button" class="quick-fill" data-message="我想预约明天下午 3 点的肩颈放松。">预约明天下午 3 点的肩颈放松</button>
                    <button type="button" class="quick-fill" data-message="帮我看看今天哪位技师有空。">查看今天可预约技师</button>
                    <button type="button" class="quick-fill" data-message="请介绍一下足底按摩服务和注意事项。">咨询服务项目和注意事项</button>
                </div>
            </section>

            <button class="nav-btn" id="clear-btn">
                <i class="fas fa-trash-alt"></i>
                清空对话
            </button>
        </aside>

        <section class="chat-panel" aria-label="预约对话">
            <header class="chat-header">
                <div>
                    <h2>智能预约助手</h2>
                    <p>面向本地生活服务门店的中文对话入口。</p>
                </div>
                <div class="status-strip" aria-label="当前能力">
                    <span class="status-chip">预约</span>
                    <span class="status-chip">咨询</span>
                    <span class="status-chip">排班</span>
                    <span class="status-chip">记忆</span>
                </div>
            </header>

            <div class="chat-content" id="chat-box">
                <div class="message bot">
                    <div class="avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="bubble">
                        <div class="bot-info">您好，我是智能预约助手。</div>
                        <div class="bot-reply">可以直接告诉我想预约的服务、时间和偏好，我会帮您检查技师与可用时间。</div>
                    </div>
                </div>
            </div>

            <div class="typing-indicator" id="typing-indicator">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                正在生成回复
            </div>

            <div class="input-area">
                <form id="chat-form">
                    <input type="text" id="user-input" placeholder="输入预约需求、服务咨询或时间偏好" autocomplete="off" required>
                    <button id="send-btn" type="submit">
                        <i class="fas fa-paper-plane"></i>
                        发送
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script>
    const chatBox = document.getElementById('chat-box');
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const clearBtn = document.getElementById('clear-btn');
    const typingIndicator = document.getElementById('typing-indicator');
    let lastBotBubble = null;

    function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        }[char]));
    }

    function formatMessage(text) {
        return escapeHtml(text).replace(/\n/g, '<br>');
    }

    function addMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ' + sender;

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.innerHTML = sender === 'user'
            ? '<i class="fas fa-user"></i>'
            : '<i class="fas fa-robot"></i>';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = formatMessage(text);

        msgDiv.appendChild(avatar);
        msgDiv.appendChild(bubble);
        chatBox.appendChild(msgDiv);

        requestAnimationFrame(() => {
            chatBox.scrollTo({
                top: chatBox.scrollHeight,
                behavior: 'smooth'
            });
        });

        if (sender === 'bot') {
            lastBotBubble = bubble;
        }
    }

    function showTypingIndicator() {
        typingIndicator.style.display = 'block';
    }

    function hideTypingIndicator() {
        typingIndicator.style.display = 'none';
    }

    function classifyReply(replyText) {
        if (replyText.includes('预约成功') || replyText.includes('已为您预约')) {
            return 'bot-success';
        }
        if (replyText.includes('抱歉') || replyText.includes('失败') || replyText.includes('不空闲')) {
            return 'bot-error';
        }
        if (replyText.includes('请问') || replyText.includes('需要')) {
            return 'bot-info';
        }
        return 'bot-reply';
    }

    function updateLastBotMessage(text) {
        if (!lastBotBubble) {
            return;
        }

        const pattern = /(\[THOUGHT[^\]]*\][\s\S]*?)(?=\[THOUGHT|\[REPLY|\[STATE|$)|(\[REPLY[^\]]*\][\s\S]*?)(?=\[THOUGHT|\[REPLY|\[STATE|$)/g;
        const result = [];
        let match;

        while ((match = pattern.exec(text)) !== null) {
            if (match[1]) {
                const thoughtText = match[1].replace(/\[THOUGHT[^\]]*\]/, '').trim();
                if (thoughtText) {
                    result.push(`<div class="bot-thought">${formatMessage(thoughtText)}</div>`);
                }
            } else if (match[2]) {
                const replyText = match[2].replace(/\[REPLY[^\]]*\]/, '').trim();
                if (replyText) {
                    result.push(`<div class="${classifyReply(replyText)}">${formatMessage(replyText)}</div>`);
                }
            }
        }

        if (result.length === 0 && text.trim()) {
            result.push(`<div class="bot-reply">${formatMessage(text.trim())}</div>`);
        }

        lastBotBubble.innerHTML = result.join('');

        requestAnimationFrame(() => {
            chatBox.scrollTo({
                top: chatBox.scrollHeight,
                behavior: 'smooth'
            });
        });
    }

    chatForm.onsubmit = async function(event) {
        event.preventDefault();
        const text = userInput.value.trim();
        if (!text) {
            return;
        }

        const sendBtn = document.getElementById('send-btn');
        sendBtn.disabled = true;
        sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中';

        addMessage(text, 'user');
        userInput.value = '';
        showTypingIndicator();
        addMessage('', 'bot');
        lastBotBubble = chatBox.querySelector('.message.bot:last-child .bubble');

        try {
            const response = await fetch('/chat/stream', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text})
            });
            hideTypingIndicator();

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let botMessage = '';

            while (true) {
                const {done, value} = await reader.read();
                if (done) {
                    break;
                }
                botMessage += decoder.decode(value, {stream: true});
                updateLastBotMessage(botMessage);
            }
        } catch (error) {
            hideTypingIndicator();
            lastBotBubble.innerHTML = '<div class="bot-error">服务暂时不可用，请稍后再试。</div>';
            console.error('Chat error:', error);
        } finally {
            sendBtn.disabled = false;
            sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> 发送';
            userInput.focus();
        }
    };

    clearBtn.onclick = function() {
        const welcomeMessage = chatBox.querySelector('.message.bot').cloneNode(true);
        chatBox.innerHTML = '';
        chatBox.appendChild(welcomeMessage);
        lastBotBubble = null;
        userInput.focus();
    };

    document.querySelectorAll('.quick-fill').forEach((button) => {
        button.addEventListener('click', () => {
            userInput.value = button.dataset.message || '';
            userInput.focus();
        });
    });

    userInput.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            chatForm.dispatchEvent(new Event('submit'));
        }
    });

    window.addEventListener('load', function() {
        userInput.focus();
    });
    </script>
</body>
</html>
