<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户行为分析 - 智能预约系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 30px;
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        
        .header h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .analysis-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .analysis-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shimmer 4s infinite;
        }
        
        .refresh-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 14px;
        }
        
        .refresh-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        
        .debug-info {
            font-size: 12px; 
            color: rgba(255,255,255,0.7); 
            margin-top: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        
        .stat-title {
            color: #666;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .stat-value.primary { color: #4facfe; }
        .stat-value.success { color: #11998e; }
        .stat-value.warning { color: #f093fb; }
        .stat-value.info { color: #667eea; }
        
        .reminder-section {
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(248,250,252,0.9));
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .reminder-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .send-reminder-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 25px;
            padding: 15px 35px;
            font-weight: bold;
            color: white;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .send-reminder-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transition: all 0.3s ease;
            transform: translate(-50%, -50%);
        }
        
        .send-reminder-btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .send-reminder-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(245, 87, 108, 0.4);
        }
        
        .reminder-message {
            background: linear-gradient(135deg, rgba(17, 153, 142, 0.1), rgba(56, 239, 125, 0.1));
            border-left: 4px solid #11998e;
            border-radius: 0 15px 15px 0;
            padding: 25px;
            margin-top: 25px;
            font-size: 16px;
            line-height: 1.6;
        }
        
        .loading {
            opacity: 0.6;
            pointer-events: none;
            position: relative;
        }
        
        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border: 3px solid #4facfe;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            transform: translate(-50%, -50%);
        }
        
        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        .nav-link {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .nav-link:hover, .nav-link.active {
            background: rgba(255,255,255,0.2);
            color: white;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2><i class="fas fa-chart-line"></i> 用户行为分析</h2>
            <p>基于历史预约数据的智能分析</p>
        </div>
        
        <div class="content">
            <div class="analysis-card">
                <h3 style="margin-bottom: 15px;"><i class="fas fa-search"></i> 用户行为分析</h3>
                <p style="margin-bottom: 20px; opacity: 0.9;">基于历史预约数据的智能分析</p>
                <button onclick="loadUserAnalysis()" class="refresh-btn">
                    <i class="fas fa-sync-alt"></i> 手动刷新数据
                </button>
                <div id="debug-info" class="debug-info">调试：页面已加载</div>
            </div>

            <!-- 用户分析数据 -->
            <div class="stats-grid" id="analysisData">
                <div class="stat-card">
                    <div class="stat-title">最喜欢的技师</div>
                    <div id="favoriteTechnician" class="stat-value primary">正在加载...</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">常用服务项目</div>
                    <div id="favoriteService" class="stat-value success">正在加载...</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">常用时长</div>
                    <div id="favoriteDuration" class="stat-value warning">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">距离上次预约</div>
                    <div id="daysSinceLastAppointment" class="stat-value info">-</div>
                </div>
            </div>
            
            <!-- 推送提醒功能 -->
            <div class="reminder-section">
                <div class="reminder-title">
                    <i class="fas fa-bell"></i> 智能推送提醒
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div>
                        <p style="color: #666; margin: 0;">基于用户偏好生成个性化回访消息</p>
                        <span id="reminderStatus" class="badge" style="background: #6c757d; color: white; padding: 4px 12px; border-radius: 12px; font-size: 12px; margin-top: 8px;">等待分析</span>
                    </div>
                    <button id="sendReminderBtn" class="send-reminder-btn" onclick="sendReminder()">
                        <i class="fas fa-paper-plane"></i> 生成回访消息
                    </button>
                </div>

                <!-- 提醒消息显示区域 -->
                <div id="reminderMessage" class="reminder-message" style="display: none;">
                    <h5 style="color: #11998e; margin-bottom: 15px;"><i class="fas fa-comment-dots"></i> 生成的回访消息：</h5>
                    <p id="messageContent" style="margin-bottom: 15px; color: #333; font-size: 16px;"></p>
                    <div id="availableTimes"></div>
                </div>
                
                <!-- 用户统计信息 -->
                <div style="margin-top: 30px; padding: 25px; background: rgba(255,255,255,0.8); border-radius: 15px; border: 1px solid rgba(255,255,255,0.3);">
                    <h4 style="color: #333; margin-bottom: 20px;"><i class="fas fa-chart-bar"></i> 用户统计信息</h4>
                    <div class="stats-grid" style="margin: 0;">
                        <div style="text-align: center;">
                            <div id="totalAppointments" style="font-size: 28px; font-weight: bold; color: #4facfe; margin-bottom: 8px;">0</div>
                            <div style="color: #666; font-size: 14px;">总预约次数</div>
                        </div>
                        <div style="text-align: center;">
                            <div id="shouldSendReminder" style="font-size: 28px; font-weight: bold; color: #11998e; margin-bottom: 8px;">否</div>
                            <div style="color: #666; font-size: 14px;">建议发送提醒</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 28px; font-weight: bold; color: #667eea; margin-bottom: 8px;">default_user</div>
                            <div style="color: #666; font-size: 14px;">当前分析用户</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 页面加载时获取用户分析数据
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOMContentLoaded事件触发');
            document.getElementById('debug-info').textContent = '调试：DOMContentLoaded已触发，开始加载数据...';
            loadUserAnalysis();
        });

        async function loadUserAnalysis() {
            try {
                console.log('开始加载用户分析数据...');
                
                // 使用与服务器一致的地址和端口
                const apiUrl = 'http://127.0.0.1:8000/api/user-behavior/analysis';
                console.log('调用API:', apiUrl);
                
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });
                
                console.log('API响应状态:', response.status);
                
                if (!response.ok) {
                    throw new Error(`API请求失败: ${response.status} ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('API返回数据:', data);
                document.getElementById('debug-info').textContent = `调试：API成功返回，共${data.total_appointments}次预约`;
                
                const elements = {
                    'favoriteTechnician': data.favorite_technician_name || '无',
                    'favoriteService': data.favorite_service || '无', 
                    'favoriteDuration': data.favorite_duration ? `${data.favorite_duration}分钟` : '无',
                    'daysSinceLastAppointment': data.days_since_last_appointment !== null ? `${data.days_since_last_appointment}天` : '无',
                    'totalAppointments': data.total_appointments || 0,
                    'shouldSendReminder': data.should_send_reminder ? '是' : '否'
                };
                
                // 逐个更新元素并验证
                Object.entries(elements).forEach(([id, value]) => {
                    const element = document.getElementById(id);
                    if (element) {
                        element.textContent = value;
                        console.log(`更新 ${id}: ${value}`);
                    } else {
                        console.error(`找不到元素: ${id}`);
                    }
                });
                
                // 更新状态显示
                const statusElement = document.getElementById('reminderStatus');
                if (statusElement) {
                    statusElement.textContent = data.should_send_reminder ? '建议发送' : '无需提醒';
                    statusElement.style.background = data.should_send_reminder ? '#11998e' : '#6c757d';
                }
                
                console.log('页面更新完成');
                document.getElementById('debug-info').textContent = `调试：页面更新完成，共${data.total_appointments}次预约`;
                
            } catch (error) {
                console.error('加载用户分析数据失败:', error);
                document.getElementById('debug-info').textContent = `调试：API调用失败 - ${error.message}`;
                
                // 显示错误信息
                const elements = ['favoriteTechnician', 'favoriteService', 'favoriteDuration', 'daysSinceLastAppointment'];
                elements.forEach(id => {
                    const element = document.getElementById(id);
                    if (element) {
                        element.textContent = '加载失败';
                    }
                });
            }
        }

        async function sendReminder() {
            try {
                console.log('开始发送提醒...');
                
                const button = document.getElementById('sendReminderBtn');
                const originalText = button.innerHTML;
                button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 生成中...';
                button.disabled = true;
                button.classList.add('loading');
                
                const response = await fetch('http://127.0.0.1:8000/api/user-behavior/send-reminder', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user_id: 'default_user'
                    })
                });

                if (!response.ok) {
                    throw new Error(`发送提醒失败: ${response.status}`);
                }

                const data = await response.json();
                console.log('提醒发送成功:', data);

                // 显示结果
                const messageDiv = document.getElementById('reminderMessage');
                const messageContent = document.getElementById('messageContent');
                const availableTimes = document.getElementById('availableTimes');
                
                messageContent.textContent = data.message || '提醒消息生成成功！';
                
                if (data.technician_available_times && data.technician_available_times.length > 0) {
                    availableTimes.innerHTML = `
                        <strong>建议预约时间：</strong><br>
                        ${data.technician_available_times.map(time => `<span style="background: #f093fb; color: white; padding: 4px 8px; border-radius: 8px; margin: 2px; display: inline-block;">${time}</span>`).join('')}
                    `;
                } else {
                    availableTimes.innerHTML = '';
                }
                
                messageDiv.style.display = 'block';
                
                // 更新状态
                const statusElement = document.getElementById('reminderStatus');
                if (statusElement) {
                    statusElement.textContent = '已发送';
                    statusElement.style.background = '#11998e';
                }

            } catch (error) {
                console.error('发送提醒失败:', error);
                alert('发送提醒失败: ' + error.message);
            } finally {
                // 恢复按钮状态
                const button = document.getElementById('sendReminderBtn');
                button.innerHTML = '<i class="fas fa-paper-plane"></i> 生成回访消息';
                button.disabled = false;
                button.classList.remove('loading');
            }
        }
    </script>
</body>
</html>
