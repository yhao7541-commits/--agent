- id: booking_missing_date_001
  suite: booking
  user_id: eval_booking_001
  turns:
    - user: "我想约一个肩颈放松"
  expected:
    intent: booking
    missing_slots:
      - date
      - time_window
    forbidden_tools:
      - create_booking
    rag_used: false

- id: booking_confirm_001
  suite: booking
  user_id: eval_booking_002
  turns:
    - user: "我想明天下午3点约肩颈放松"
    - user: "确认"
  expected:
    intent: booking
    required_tools:
      - check_schedule
      - create_booking
    booking_completed: true
    rag_used: false

- id: booking_cancel_001
  suite: booking
  user_id: eval_booking_003
  turns:
    - user: "取消预约 booking_1234"
  expected:
    intent: cancel
    required_tools:
      - cancel_booking
    tool_arguments:
      cancel_booking:
        booking_id: booking_1234
    rag_used: false

- id: booking_reschedule_001
  suite: booking
  user_id: eval_booking_004
  turns:
    - user: "把 booking_5678 改约到明天下午3点"
  expected:
    intent: reschedule
    required_tools:
      - reschedule_booking
    tool_arguments:
      reschedule_booking:
        booking_id: booking_5678
        new_time_window: "15:00"
    rag_used: false
