- id: booking_missing_date_001
  suite: booking
  user_id: eval_booking_001
  turns:
    - user: "我想约一个肩颈放松"
  expected:
    intent: booking
    missing_slots:
      - date
      - time_window
    booking_slots:
      service_type: 肩颈放松
    forbidden_tools:
      - create_booking
    rag_used: false

- id: booking_confirm_001
  suite: booking
  user_id: eval_booking_002
  turns:
    - user: "我想明天下午3点约肩颈放松"
    - user: "确认"
  expected:
    intent: booking
    required_tools:
      - check_schedule
      - create_booking
    booking_slots:
      service_type: 肩颈放松
      time_window: "15:00"
    booking_completed: true
    rag_used: false

- id: booking_cancel_001
